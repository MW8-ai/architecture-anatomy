<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#080b11"/>
  <!-- three horizontal plates -->
  <rect x="80" y="160" width="352" height="44" rx="8" fill="none" stroke="#34d6c0" stroke-width="6" opacity="0.9"/>
  <rect x="80" y="234" width="352" height="44" rx="8" fill="none" stroke="#e8574f" stroke-width="6" opacity="0.75"/>
  <rect x="80" y="308" width="352" height="44" rx="8" fill="none" stroke="#c8a040" stroke-width="6" opacity="0.65"/>
  <!-- nodes on top plate -->
  <rect x="112" y="168" width="72" height="28" rx="5" fill="#34d6c0" opacity="0.18"/>
  <rect x="220" y="168" width="72" height="28" rx="5" fill="#34d6c0" opacity="0.18"/>
  <rect x="328" y="168" width="72" height="28" rx="5" fill="#34d6c0" opacity="0.18"/>
  <!-- connecting lines -->
  <line x1="184" y1="182" x2="220" y2="182" stroke="#34d6c0" stroke-width="3" opacity="0.6"/>
  <line x1="292" y1="182" x2="328" y2="182" stroke="#34d6c0" stroke-width="3" opacity="0.6"/>
  <!-- vertical connectors between plates -->
  <line x1="148" y1="196" x2="148" y2="242" stroke="#ecead2" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="256" y1="196" x2="256" y2="242" stroke="#ecead2" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="364" y1="196" x2="364" y2="242" stroke="#ecead2" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
</svg>
