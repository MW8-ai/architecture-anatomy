name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fingerprint gate
        run: bash scripts/sanitize-check.sh
      - uses: actions/setup-node@v5
        with: { node-version: '24' }
      - name: Validation engine tests
        run: node test/validate.test.mjs
      - name: Catalog index smoke
        run: node scripts/check-catalog-index.mjs
