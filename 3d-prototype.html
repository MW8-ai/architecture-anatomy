/* ============ Validation engine (Phase A, embedded) ============ */
const AnatomyValidate=(()=>{ 
const BOUNDARY_RANK={"commercial":0,"gcc":1,"gcc-high":2,"dod":3};
const allEdges=c=>(c.layers||[]).flatMap(l=>(l.edges||[]).map(e=>({...e,layer:l.id})));
const neighbors=c=>{const a={};for(const e of allEdges(c)){(a[e.a]=a[e.a]||new Set()).add(e.b);(a[e.b]=a[e.b]||new Set()).add(e.a);}return a;};
function unmetRequirements(c){const F=[],adj=neighbors(c),N=c.nodes||{};
 for(const[id,n]of Object.entries(N))for(const req of(n.requires||[])){
  const ok=[...(adj[id]||[])].some(nb=>((N[nb]||{}).provides||[]).includes(req));
  if(!ok)F.push({id:`req:${id}:${req}`,severity:"error",rule:"unmet-requirement",nodeId:id,
   text:`${n.t||id} requires "${req}" but no connected node provides it.`});}
 return F;}
function blastRadius(c,nodeId){const N=c.nodes||{},dep={};
 for(const[id,n]of Object.entries(N))for(const d of(n.dependsOn||[]))(dep[d]=dep[d]||[]).push(id);
 const orph=new Set(),q=[nodeId];
 while(q.length){const cur=q.shift();for(const d of(dep[cur]||[]))if(!orph.has(d)&&d!==nodeId){orph.add(d);q.push(d);}}
 return{nodeId,orphans:[...orph]};}
function boundaryPathCheck(c,flow){const N=c.nodes||{},steps=flow.steps||[];
 const ranks=steps.map(s=>BOUNDARY_RANK[(N[s]||{}).boundary]).filter(r=>r!==undefined);
 if(!ranks.length)return[];const strict=Math.max(...ranks),F=[];
 const name=r=>Object.keys(BOUNDARY_RANK).find(k=>BOUNDARY_RANK[k]===r);
 for(const s of steps){const r=BOUNDARY_RANK[(N[s]||{}).boundary];
  if(r!==undefined&&r<strict)F.push({id:`boundary:${flow.id}:${s}`,severity:"error",rule:"boundary-violation",nodeId:s,flowId:flow.id,
   text:`Flow "${flow.name||flow.id}" carries ${name(strict)} data through ${(N[s]||{}).t||(N[s]||{}).l||s} (${(N[s]||{}).boundary}).`});}
 return F;}
function validateCatalog(c){const ign=new Set(((c.meta||{}).ignoredFindings)||[]);
 let F=[...unmetRequirements(c),...((c.flows||[]).flatMap(f=>boundaryPathCheck(c,f)))];
 F=F.map(f=>ign.has(f.id)?{...f,severity:"info",ignored:true,text:f.text+" (explicitly ignored)"}:f);
 const per={};const ORD={error:3,warning:2,ignored:1,info:0};
 for(const f of F)if(f.nodeId){const s=f.ignored?"ignored":f.severity;
  if((ORD[s]??0)>=(ORD[per[f.nodeId]]??-1))per[f.nodeId]=s;}
 return{findings:F,perNode:per,summary:{errors:F.filter(f=>f.severity==="error").length,
  warnings:F.filter(f=>f.severity==="warning").length,ignored:F.filter(f=>f.ignored).length}};}
return{validateCatalog,blastRadius,boundaryPathCheck,unmetRequirements,BOUNDARY_RANK};
})();

function applyCam(){
 const t=orbit.target;
 camera.position.set(
  t.x+orbit.dist*Math.sin(orbit.phi)*Math.cos(orbit.theta),
  t.y+orbit.dist*Math.cos(orbit.phi),
  t.z+orbit.dist*Math.sin(orbit.phi)*Math.sin(orbit.theta));
 camera.lookAt(t);
}
let drag=null;
renderer.domElement.addEventListener("pointerdown",e=>{drag={x:e.clientX,y:e.clientY,pan:e.shiftKey||e.button===2};renderer.domElement.setPointerCapture(e.pointerId);});
renderer.domElement.addEventListener("pointermove",e=>{
 if(drag){const dx=e.clientX-drag.x,dy=e.clientY-drag.y;drag.x=e.clientX;drag.y=e.clientY;
  if(drag.pan){const s=orbit.dist/700;
   const right=new THREE.Vector3().subVectors(camera.position,orbit.target).cross(camera.up).normalize();
   orbit.target.addScaledVector(right,dx*s);orbit.target.y+=dy*s;}
  else{orbit.theta+=dx*0.005;orbit.phi=Math.min(Math.max(orbit.phi-dy*0.005,0.15),1.5);}
  drag.moved=(drag.moved||0)+Math.abs(dx)+Math.abs(dy);}
 else hover(e);
});

 g.fillStyle="#0c1322";g.fillRect(0,0,256,128);
 g.strokeStyle=status==="error"?"#ff4d5e":status==="warning"||status==="ignored"?"#e0a94e":"#2a3d5e";
 g.lineWidth=6;g.strokeRect(4,4,248,120);

 const t=new THREE.CanvasTexture(c);t.anisotropy=4;return t;

function wrap(g,text,x,y,maxW,lh){const words=String(text).split(" ");let line="",yy=y;
 for(const w of words){const test=line?line+" "+w:w;
  if(g.measureText(test).width>maxW&&line){g.fillText(line,x,yy);line=w;yy+=lh;}else line=test;}
 g.fillText(line,x,yy);}

 const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
 const W=150,D=110,pad=14;
 const sx=v=>((v-minX)/Math.max(maxX-minX,1)-0.5)*W;
 const sz=v=>((v-minY)/Math.max(maxY-minY,1)-0.5)*D;
 const planeW=W+pad*2,planeD=D+pad*2;

 layers.forEach((layer,i)=>{
  const g=new THREE.Group();g.userData={idx:i,id:layer.id,visible:true};
  /* plane */
  const plane=new THREE.Mesh(new THREE.PlaneGeometry(planeW,planeD),
   new THREE.MeshBasicMaterial({color:0x11203a,transparent:true,opacity:0.16,side:THREE.DoubleSide,depthWrite:false}));
  plane.rotation.x=-Math.PI/2;g.add(plane);
  const border=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(planeW,planeD)),
   new THREE.LineBasicMaterial({color:0x2a3d5e,transparent:true,opacity:0.9}));
  border.rotation.x=-Math.PI/2;g.add(border);
  /* zones as strips (mapped from catalog 2D y) */
  for(const z of(cat.zones||[])){
   const z0=sz(z.y0),z1=sz(z.y1);
   const strip=new THREE.Mesh(new THREE.PlaneGeometry(planeW,Math.abs(z1-z0)),
    new THREE.MeshBasicMaterial({color:0x5ec8e5,transparent:true,opacity:0.045,side:THREE.DoubleSide,depthWrite:false}));
   strip.rotation.x=-Math.PI/2;strip.position.set(0,0.05,(z0+z1)/2);g.add(strip);
  }
  /* layer label */
  const lt=labelTexture(layer.arch||layer.id,layer.organ||"", "ok");
  const lbl=new THREE.Sprite(new THREE.SpriteMaterial({map:lt,transparent:true,opacity:0.9}));
  lbl.scale.set(26,13,1);lbl.position.set(-planeW/2+16,5,-planeD/2+8);g.add(lbl);
  /* participants + edges */
  const parts=new Set();(layer.edges||[]).forEach(e=>{parts.add(e.a);parts.add(e.b);});
  for(const e of(layer.edges||[])){
   const A=nodes[e.a],B=nodes[e.b];if(!A||!B)continue;
   const geo=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(sx(A.x),1.4,sz(A.y)),new THREE.Vector3(sx(B.x),1.4,sz(B.y))]);
   const mat=new THREE.LineBasicMaterial({color:COL[e.conn]||COL.default,transparent:true,opacity:0.85});
   const ln=new THREE.Line(geo,mat);ln.userData={edge:e};g.add(ln);
  }
  for(const id of parts){
   const n=nodes[id];if(!n)continue;
   const status=VAL.perNode[id]||"ok";
   const sideC=status==="error"?COL.error:status==="warning"?COL.warning:status==="ignored"?COL.ignored:COL.ok;
   const side=new THREE.MeshBasicMaterial({color:sideC});
   const top=new THREE.MeshBasicMaterial({map:labelTexture(n.t||n.l||id,n.boundary,status)});
   const bot=new THREE.MeshBasicMaterial({color:0x0c1322});
   const mesh=new THREE.Mesh(new THREE.BoxGeometry(13,1.6,7),[side,side,top,bot,side,side]);
   mesh.position.set(sx(n.x),0.9,sz(n.y));
   mesh.userData={nodeId:id,layerIdx:i,baseColor:sideC};
   g.add(mesh);nodeMeshes.push(mesh);
  }
  world.add(g);layerGroups.push(g);
 });
 /* spines: same node across multiple layers */
 const byNode={};nodeMeshes.forEach(m=>{(byNode[m.userData.nodeId]=byNode[m.userData.nodeId]||[]).push(m);});
 for(const[id,arr]of Object.entries(byNode)){
  if(arr.length<2)continue;
  const geo=new THREE.BufferGeometry();
  geo.setAttribute("position",new THREE.BufferAttribute(new Float32Array(arr.length*3),3));
  const mat=new THREE.LineDashedMaterial({color:0x5ec8e5,dashSize:1.6,gapSize:1.4,transparent:true,opacity:0});
  const ln=new THREE.Line(geo,mat);ln.userData={nodeId:id,meshes:arr};
  world.add(ln);spines.push(ln);
 }
 ui(); layoutLayers(true);
}

let sepTarget=0,sepNow=0;   /* 0..1 */
const SEP_MAX=30;
function layoutLayers(force){
 layerGroups.forEach((g,i)=>{g.position.y=i*sepNow*SEP_MAX;g.visible=g.userData.visible;});
 spines.forEach(s=>{
  const pos=s.geometry.attributes.position;
  s.userData.meshes.forEach((m,i)=>{
   const p=new THREE.Vector3();m.getWorldPosition(p);pos.setXYZ(i,p.x,p.y,p.z);});
  pos.needsUpdate=true;s.computeLineDistances();
  s.material.opacity=0.55*sepNow*(s.userData.meshes.some(m=>!layerGroups[m.userData.layerIdx].userData.visible)?0:1);
 });
 if(flowLine)drawFlow(flowLine.userData.flow,true);
}

/* ============ Picking / hover / inspect ============ */
function castAt(e){
 const r=renderer.domElement.getBoundingClientRect();
 mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;
 raycaster.setFromCamera(mouse,camera);
 const vis=nodeMeshes.filter(m=>layerGroups[m.userData.layerIdx].userData.visible);
 return raycaster.intersectObjects(vis)[0]?.object||null;
}
function hover(e){
 const m=castAt(e);
 if(hovered&&hovered!==m)tint(hovered,null);
 hovered=m;renderer.domElement.style.cursor=m?"pointer":"default";
 if(m)tint(m,0xffffff,0.25);
}
function tint(mesh,color,amt){
 const same=nodeMeshes.filter(x=>x.userData.nodeId===mesh.userData.nodeId);
 same.forEach(x=>{x.material.forEach?.(()=>{});
  const mats=Array.isArray(x.material)?x.material:[x.material];
  mats.forEach((mm,i)=>{if(i===2)return;/* keep label face */
   mm.color.set(color?new THREE.Color(x.userData.baseColor).lerp(new THREE.Color(color),amt):x.userData.baseColor);});});
}
function pick(e){
 const m=castAt(e);
 if(!m){return;}
 select(m.userData.nodeId,m);
}
function select(id,mesh){
 nodeMeshes.forEach(x=>tint(x,null));
 selected=id;
 const n=CAT.nodes[id]||{};
 const blast=AnatomyValidate.blastRadius(CAT,id);
 blast.orphans.forEach(o=>nodeMeshes.filter(x=>x.userData.nodeId===o).forEach(x=>tint(x,COL.error,0.55)));
 nodeMeshes.filter(x=>x.userData.nodeId===id).forEach(x=>tint(x,0xffffff,0.4));
 const F=VAL.findings.filter(f=>f.nodeId===id);
 const li=a=>a&&a.length?a.map(x=>`<li>· ${esc(x)}</li>`).join(""):"<li style='color:var(--muted)'>— none</li>";
 document.getElementById("inspectBody").innerHTML=
  `<h2>${esc(n.t||n.l||id)}</h2>`+
  `<span class="tag">${esc(n.boundary||"no boundary tag")}</span>`+
  (n.compliance?`<span class="tag">${esc(n.compliance.fedramp?("FedRAMP "+n.compliance.fedramp):"")}${esc(n.compliance.dataClass?(" · "+n.compliance.dataClass.toUpperCase()):"")}</span>`:"")+
  `<h3>Requires</h3><ul>${li(n.requires)}</ul>`+
  `<h3>Provides</h3><ul>${li(n.provides)}</ul>`+
  `<h3>Depends on</h3><ul>${li(n.dependsOn)}</ul>`+
  `<h3>Findings</h3><ul>${F.length?F.map(f=>`<li class="${f.ignored?"ign":f.severity==="error"?"err":"warn"}">▲ ${esc(f.text)}</li>`).join(""):"<li style='color:var(--muted)'>— clean</li>"}</ul>`+
  `<h3>Blast radius</h3><ul>${blast.orphans.length?blast.orphans.map(o=>`<li class="err">✕ ${esc((CAT.nodes[o]||{}).t||(CAT.nodes[o]||{}).l||o)}</li>`).join(""):"<li style='color:var(--muted)'>— nothing depends on this</li>"}</ul>`;
 document.getElementById("inspect").style.display="block";
 /* focus */
 const p=new THREE.Vector3();(mesh||nodeMeshes.find(x=>x.userData.nodeId===id)).getWorldPosition(p);
 focusTo(p,46);
}
let focusAnim=null,preFocusDist=null;
function focusTo(p,dist){
 if(dist!==undefined&&preFocusDist===null)preFocusDist=orbit.dist;
 focusAnim={from:orbit.target.clone(),to:p.clone(),t:0,
  fromDist:orbit.dist,toDist:dist!==undefined?dist:orbit.dist};
}
document.getElementById("closeInspect").onclick=()=>{
 document.getElementById("inspect").style.display="none";
 nodeMeshes.forEach(x=>tint(x,null));selected=null;
 if(preFocusDist!==null){focusAnim={from:orbit.target.clone(),to:orbit.target.clone(),t:0,fromDist:orbit.dist,toDist:preFocusDist};preFocusDist=null;}};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ============ Flows ============ */
function drawFlow(flow,keep){
 if(flowLine){world.remove(flowLine);flowLine=null;}
 if(!flow)return;
 const pts=[];
 for(const s of flow.steps||[]){
  const m=nodeMeshes.find(x=>x.userData.nodeId===s&&layerGroups[x.userData.layerIdx].userData.visible)
        ||nodeMeshes.find(x=>x.userData.nodeId===s);
  if(!m)continue;const p=new THREE.Vector3();m.getWorldPosition(p);p.y+=3.2;pts.push(p);
 }
 if(pts.length<2)return;
 const bad=AnatomyValidate.boundaryPathCheck(CAT,flow).length>0;
 flowLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
  new THREE.LineBasicMaterial({color:bad?COL.error:0x5ec8e5,transparent:true,opacity:0.95,linewidth:2}));
 flowLine.userData={flow};world.add(flowLine);
}

/* ============ UI ============ */
function ui(){
 document.getElementById("cattitle").textContent=(CAT.meta&&CAT.meta.title)||"untitled catalog";
 const s=VAL.summary;
 document.getElementById("sum").innerHTML=
  `<span class="e">▲ ${s.errors} error${s.errors===1?"":"s"}</span>`+
  `<span class="w">▲ ${s.warnings} warn</span>`+
  `<span class="i">◇ ${s.ignored} ignored</span>`;
 const ll=document.getElementById("layerlist");ll.innerHTML="";
 layerGroups.forEach((g,i)=>{
  const L=CAT.layers[i];
  const row=document.createElement("div");row.className="lyr";row.tabIndex=0;
  row.innerHTML=`<span class="sw" style="background:${g.userData.visible?"var(--cyan)":"transparent"}"></span>${esc(L.arch||L.id)} <span style="color:var(--muted)">· ${esc(L.organ||"")}</span>`;
  const tog=()=>{g.userData.visible=!g.userData.visible;row.classList.toggle("off",!g.userData.visible);
   row.querySelector(".sw").style.background=g.userData.visible?"var(--cyan)":"transparent";layoutLayers();};
  row.onclick=tog;row.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();tog();}};
  ll.appendChild(row);
 });
 const cats=document.getElementById("cats");cats.innerHTML="";
 for(const name of Object.keys(CATALOG_LIBRARY)){
  const b=document.createElement("button");b.textContent=name;
  b.className=(CAT===CATALOG_LIBRARY[name])?"on":"";
  b.onclick=()=>build(CATALOG_LIBRARY[name]);cats.appendChild(b);
 }
 const fl=document.getElementById("flows");fl.innerHTML="";
 (CAT.flows||[]).forEach(f=>{
  const bad=AnatomyValidate.boundaryPathCheck(CAT,f).length>0;
  const b=document.createElement("button");b.textContent=(bad?"▲ ":"")+(f.name||f.id);
  if(bad)b.className="bad";
  b.onclick=()=>{ if(flowLine&&flowLine.userData.flow===f){drawFlow(null);}else drawFlow(f); };
  fl.appendChild(b);
 });
 document.getElementById("inspect").style.display="block";
 document.getElementById("inspectBody").innerHTML=
  `<h2>${esc((CAT.meta&&CAT.meta.title)||"Catalog")}</h2>`+
  `<span class="tag">${Object.keys(CAT.nodes||{}).length} nodes</span><span class="tag">${(CAT.layers||[]).length} layers</span>`+
  `<h3>Validation</h3><ul>${VAL.findings.length?VAL.findings.map(f=>`<li class="${f.ignored?"ign":f.severity==="error"?"err":"warn"}">▲ ${esc(f.text)}</li>`).join(""):"<li style='color:var(--muted)'>— catalog is clean</li>"}</ul>`;
}

/* ============ Input: keys, slider, drop ============ */
const sep=document.getElementById("sep");
sep.addEventListener("input",()=>{sepTarget=sep.value/100;});
addEventListener("keydown",e=>{
 if(e.target.tagName==="INPUT"&&e.key!==" ")return;
 if(e.key===" "){e.preventDefault();sepTarget=sepTarget>0.5?0:1;sep.value=sepTarget*100;}
 if(e.key==="ArrowUp"){sepTarget=Math.min(1,sepTarget+0.1);sep.value=sepTarget*100;}
 if(e.key==="ArrowDown"){sepTarget=Math.max(0,sepTarget-0.1);sep.value=sepTarget*100;}
 if(e.key==="f"||e.key==="F"){sepTarget=0;sep.value=0;}
 if(e.key==="r"||e.key==="R"){orbit.theta=HOME.theta;orbit.phi=HOME.phi;orbit.dist=HOME.dist;orbit.target.set(HOME.target.x,HOME.target.y,HOME.target.z);}
});
addEventListener("dragover",e=>{e.preventDefault();document.getElementById("drop").style.display="flex";});
addEventListener("dragleave",e=>{if(e.relatedTarget===null)document.getElementById("drop").style.display="none";});
addEventListener("drop",async e=>{
 e.preventDefault();document.getElementById("drop").style.display="none";
 const f=e.dataTransfer.files[0];if(!f)return;
 try{const j=JSON.parse(await f.text());
  if(j&&j.nodes&&j.layers){CATALOG_LIBRARY[f.name.replace(/\.json$/,"")]=j;build(j);}
  else alert("Not a catalog: needs nodes + layers.");
 }catch(err){alert("Invalid JSON: "+err.message);}
});

/* ============ Loop ============ */
function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
addEventListener("resize",resize);resize();
function loop(){
 requestAnimationFrame(loop);
 const ease=RM?1:0.08;
 if(Math.abs(sepTarget-sepNow)>0.0005){sepNow+=(sepTarget-sepNow)*ease;layoutLayers();}
 if(focusAnim){focusAnim.t=RM?1:Math.min(1,focusAnim.t+0.05);
  const k=1-Math.pow(1-focusAnim.t,3);
  orbit.target.lerpVectors(focusAnim.from,focusAnim.to,k);
  orbit.dist=focusAnim.fromDist+(focusAnim.toDist-focusAnim.fromDist)*k;
  if(focusAnim.t>=1)focusAnim=null;}
 applyCam();renderer.render(scene,camera);
}
build(CATALOG_LIBRARY["Sovereign Sample"]);
/* opening moment: fold -> explode, once */
if(!RM){setTimeout(()=>{sepTarget=1;sep.value=100;},450);}else{sepTarget=1;sepNow=1;sep.value=100;layoutLayers();}
loop();
</script>
</body>
</html>
